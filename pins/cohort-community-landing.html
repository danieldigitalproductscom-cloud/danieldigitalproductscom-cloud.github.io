<!doctype html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0}
.pin{width:1000px;height:1500px;padding:80px 64px;display:flex;flex-direction:column;align-items:center;text-align:center;
  font-family:'Inter',sans-serif;color:#ECECF5;overflow:hidden;
  background:radial-gradient(75% 45% at 50% 0,color-mix(in srgb,#ec4899 34%,#0a0a0f),#0a0a0f 70%)}
.eyebrow{font-size:24px;font-weight:600;letter-spacing:.2em;color:#ec4899}
h1{font-family:'Space Grotesk',sans-serif;font-size:78px;line-height:1.02;margin:22px 0 10px;font-weight:700}
.grad{background:linear-gradient(120deg,#ec4899,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent}
.benefit{font-size:30px;color:#9b9bb4;margin-bottom:48px}
.frame{width:100%;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.16);box-shadow:0 50px 110px -36px rgba(0,0,0,.85);background:#14141f}
.bar{display:flex;gap:11px;padding:20px 22px;background:#1a1a2c;border-bottom:1px solid rgba(255,255,255,.09)}
.bar i{width:16px;height:16px;border-radius:50%;background:#6c6c85;opacity:.55}
.frame img{width:100%;display:block}
.foot{margin-top:auto;display:flex;flex-direction:column;gap:14px;align-items:center}
.price{font-family:'Space Grotesk';font-size:40px;font-weight:700}
.brand{display:flex;align-items:center;gap:14px;font-family:'Space Grotesk';font-weight:600;font-size:34px}
.dot{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#ec4899,#8b5cf6)}
.url{font-size:24px;color:#ec4899;font-weight:600}
</style></head><body>
<div class="pin">
  <div class="eyebrow">LANDING PAGE TEMPLATE</div>
  <h1>Cohort<br/><span class="grad">Community &amp; Creator Platform</span></h1>
  <div class="benefit">Clean HTML &amp; CSS · No build step · Ship today</div>
  <div class="frame"><div class="bar"><i></i><i></i><i></i></div><img src="/assets/shots/cohort-community-landing.jpeg" alt=""/></div>
  <div class="foot"><div class="price">$24 · Live demo</div>
    <div class="brand"><span class="dot"></span>Plinth</div>
    <div class="url">danieldigitalproductscom-cloud.github.io</div></div>
</div></body></html>
